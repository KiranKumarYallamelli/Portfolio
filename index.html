<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Kiran Kumar Yallamelli | Software Developer & Cloud Engineer</title>
    <meta
      name="description"
      content="Portfolio of Kiran Kumar Yallamelli — Software Developer, React Developer and Google Cloud Certified Associate Cloud Engineer. Explore projects, skills, and experience in full‑stack development, cloud and AI/ML."

    <meta name="keywords" content="Kiran Kumar Yallamelli, Software Developer, React Developer, Cloud Engineer, GCP, Full Stack Developer, AI ML Engineer, Portfolio" />
    <meta name="author" content="Kiran Kumar Yallamelli" />
    <meta name="theme-color" content="#050816" />
    <meta name="robots" content="index, follow" />

    <!-- Set theme class before first paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('kky-theme');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kiran Kumar Yallamelli | Software Developer & Cloud Engineer" />
    <meta
      property="og:description"
      content="Software Developer, React Developer and Google Cloud Certified Associate Cloud Engineer. Explore my projects, skills and experience."
    />
    <meta property="og:image" content="/assets/og-cover.svg" />

    <!-- Twitter -->

    <!-- Preconnect for fonts -->
